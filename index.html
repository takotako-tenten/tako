<!DOCTYPE html>
<html>
    <head>
        <title>about me</title>

        <style>
            body.dark {
                --bg-color: black;
                --ti-color: white;
                --te-color: gainsboro;
            }

            #body {
                background-color: var(--bg-color);
            }

            #text {
                color: var(--te-color);
            }

            .header-area {
                display: flex;
                align-items: flex-start;
            }

            #title {
                margin:auto;
                color: var(--ti-color);
            }
        </style>
    </head>
    <body id="body">
        <div class="header-area">
            <h1 id="title">About me</h1>
            <button id="button">Dark mode</button>
        </div>
        <p id="text">My name is teruki. I'm S1 student. I was born in Japan.</p>
        <script src="index.js"></script>
    </body>
</html>
